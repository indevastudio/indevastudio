+name: Auto Blog Publisher
+
+on:
+  schedule:
+    - cron: '30 22 * * *'   # 04:00 IST daily — generates blogs
+  workflow_dispatch:
+
+jobs:
+  publish:
+    runs-on: ubuntu-latest
+    permissions:
+      contents: write
+
+    steps:
+      - name: Checkout repo
+        uses: actions/checkout@v4
+
+      - name: Setup Node.js
+        uses: actions/setup-node@v4
+        with:
+          node-version: '22'
+
+      - name: Install dependencies (safe even if package.json absent)
+        run: |
+          if [ -f package.json ]; then npm install --no-audit --no-fund; fi
+
+      - name: Syntax check blog generator
+        run: node --check scripts/generate-blogs.js
+
+      - name: Generate blogs
+        env:
+          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
+          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
+          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
+          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
+        run: node scripts/generate-blogs.js
+
+      - name: Show what was generated
+        run: |
+          echo "── New files in insights/ ──"
+          git status --short insights/ || true
+          echo "── blog-memory.json head ──"
+          head -c 800 content/blog-memory.json 2>/dev/null || echo "(no memory file yet)"
+
+      - name: Commit and push
+        run: |
+          git config user.name "Indeva Bot"
+          git config user.email "bot@indevastudio.com"
+          git add -A
+          if git diff --staged --quiet; then
+            echo "⚠️  No changes to commit — script ran but produced nothing. Check logs above."
+            exit 0
+          fi
+          git commit -m "Auto-publish blogs $(date +%Y-%m-%d)"
+          git push
+
+      - name: Validate email API key
+        if: success()
+        env:
+          RESEND_API_KEY: re_dK55fs95_9hmR3Ur55jmHGt8cMDNskNxz
+        run: |
+          if [ -z "$RESEND_API_KEY" ]; then
+            echo "❌ RESEND_API_KEY is missing."
+            exit 1
+          fi
+
+      - name: Send email notification
+        if: success()
+        env:
+          RESEND_API_KEY: re_dK55fs95_9hmR3Ur55jmHGt8cMDNskNxz
+          EMAIL_TO: ceo@indevastudio.com
+          EMAIL_FROM: Indeva Studio <hello@indevastudio.com>
+        run: |
+          if [ -f scripts/email-notifier.js ]; then
+            node scripts/email-notifier.js
+          else
+            echo "ℹ️  email-notifier.js not present — skipping"
+          fi
 
EOF
)
