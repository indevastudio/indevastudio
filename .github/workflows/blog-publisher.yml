name: Auto Blog Publisher

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blogs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blogs.js

      - name: Commit and push
        run: |
          git config user.name "Indeva Bot"
          git config user.email "bot@indevastudio.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-publish blogs"
          git push

      - name: Send email notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/email-notifier.js
