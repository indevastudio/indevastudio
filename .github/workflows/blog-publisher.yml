name: Auto Blog Publisher

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Generate blogs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blogs.js

      - name: Push to GitHub
        run: |
          git config user.name "Indeva Bot"
          git config user.email "bot@indevastudio.com"
          git add blogs/ content/
          git diff --staged --quiet || git commit -m "Auto-publish blogs $(date +%Y-%m-%d)"
          git push
