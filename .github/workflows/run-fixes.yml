name: Run one-time SEO fixes

on:
  workflow_dispatch:   # manual trigger only

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix editorial 404s
        run: python scripts/create_editorial_stubs.py

      - name: Fix canonical www URLs
        run: python scripts/fix_canonicals.py

      - name: Commit fixes
        run: |
          git config user.name "Indeva Bot"
          git config user.email "bot@indevastudio.com"
          git add insights/
          git diff --staged --quiet || git commit -m "fix: editorial 404s + canonical www on all blog posts"
          git push