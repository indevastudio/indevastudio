name: 🤖 Auto-Generate & Deploy Missing Blog Posts

on:
  schedule:
    - cron: '0 * * * *'    # every hour
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — detect only, do not generate'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  auto-generate:
    name: Detect → Generate → Commit → Deploy → Index → Notify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: ⬇️  Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── LOOP GUARD ────────────────────────────────────────────────
      # Prevents infinite loop WITHOUT using [skip ci]
      # [skip ci] was blocking Vercel deployments — this is the root cause fix
      - name: 🛑  Skip if triggered by bot commit
        run: |
          AUTHOR=$(git log -1 --pretty=format:'%an')
          echo "Last commit author: $AUTHOR"
          if [ "$AUTHOR" = "indeva-bot[auto]" ]; then
            echo "Bot commit detected — skipping to prevent loop."
            exit 0
          fi

      - name: ⚙️  Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🤖  Detect & generate missing blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INDEXNOW_KEY:      ${{ secrets.INDEXNOW_KEY }}
          NOTIFY_TO:         ${{ secrets.NOTIFY_TO }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/auto-generate.js --dry-run
          else
            node scripts/auto-generate.js
          fi

      - name: 🔎  Check for new files
        id: diff
        run: |
          git diff --quiet HEAD insights/ \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      # ── CRITICAL FIX: NO [skip ci] in commit message ──────────────
      # [skip ci] was telling Vercel to skip deployment.
      # Removed it. Bot loop is prevented by the author-check above.
      - name: 💾  Commit generated files → Vercel auto-deploys
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "indeva-bot[auto]"
          git config user.email "indeva-bot@users.noreply.github.com"

          git add insights/

          COUNT=$(git diff --staged --name-only | grep "index.html" | wc -l | tr -d ' ')
          SLUGS=$(git diff --staged --name-only | grep "index.html" \
            | sed 's|insights/||;s|/index.html||' \
            | tr '\n' ', ' | sed 's/,$//')

          git commit -m "🤖 auto: generate ${COUNT} blog post(s)

          Slugs: ${SLUGS}
          Time:  $(date -u '+%Y-%m-%d %H:%M UTC')"

          git push origin main
          echo "✅ Pushed. Vercel is now deploying."

      - name: ⏳  Wait for Vercel to deploy (90s)
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: sleep 90

      - name: ✅  Health check new URLs
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          if [ ! -f ".generated-slugs.json" ]; then exit 0; fi
          SLUGS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.generated-slugs.json','utf8')).join(' '))")
          for SLUG in $SLUGS; do
            URL="https://www.indevastudio.com/insights/${SLUG}/"
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$URL")
            [ "$STATUS" = "200" ] \
              && echo "  ✅  ${URL}  →  HTTP 200" \
              || echo "  ⚠️   ${URL}  →  HTTP ${STATUS} (still propagating)"
          done

      - name: ℹ️  Nothing to generate
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ All blog posts up to date."

      - name: 📊  Summary
        if: always()
        run: |
          echo "## 🤖 Auto Blog Report" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Root cause fixed** | [skip ci] removed ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(find insights -name "index.html" 2>/dev/null | grep -v "^insights/index.html$" | wc -l | tr -d ' ')
          echo "| **Total blog posts** | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
