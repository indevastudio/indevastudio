name: 🤖 Auto-Generate & Deploy Missing Blog Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — detect only, do not generate'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  auto-generate:
    name: Detect → Generate → Commit → Deploy Hook → Index → Notify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: ⬇️  Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # Prevent infinite loop — skip if this was triggered by the bot
      - name: 🛑  Skip if bot commit
        id: botcheck
        run: |
          AUTHOR=$(git log -1 --pretty=format:'%an')
          if [ "$AUTHOR" = "indeva-bot[auto]" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Bot commit — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: ⚙️  Node 20
        if: steps.botcheck.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🤖  Generate missing blog posts
        if: steps.botcheck.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INDEXNOW_KEY:      ${{ secrets.INDEXNOW_KEY }}
          NOTIFY_TO:         ${{ secrets.NOTIFY_TO }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/auto-generate.js --dry-run
          else
            node scripts/auto-generate.js
          fi

      - name: 🔎  Check for new files
        if: steps.botcheck.outputs.skip == 'false'
        id: diff
        run: |
          git diff --quiet HEAD insights/ \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: 💾  Commit to GitHub
        if: steps.botcheck.outputs.skip == 'false' && steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "indeva-bot[auto]"
          git config user.email "indeva-bot@users.noreply.github.com"
          git add insights/
          COUNT=$(git diff --staged --name-only | grep "index.html" | wc -l | tr -d ' ')
          SLUGS=$(git diff --staged --name-only | grep "index.html" \
            | sed 's|insights/||;s|/index.html||' \
            | tr '\n' ', ' | sed 's/,$//')
          git commit -m "🤖 auto: generate ${COUNT} blog post(s)

          Slugs: ${SLUGS}
          Time:  $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
          echo "✅ Committed and pushed to GitHub."

      # ── THE FIX: Trigger Vercel via Deploy Hook ───────────────────
      # GitHub push alone wasn't triggering Vercel (manual upload history
      # had overridden the GitHub connection). Deploy Hook forces it.
      - name: 🚀  Trigger Vercel deployment via Deploy Hook
        if: steps.botcheck.outputs.skip == 'false' && steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          echo "Triggering Vercel deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          if [ "$RESPONSE" = "201" ]; then
            echo "✅ Vercel deployment triggered successfully."
          else
            echo "⚠️  Deploy hook returned HTTP $RESPONSE"
            echo "    Check your VERCEL_DEPLOY_HOOK secret is correct."
          fi

      - name: ⏳  Wait for Vercel to deploy (90s)
        if: steps.botcheck.outputs.skip == 'false' && steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: sleep 90

      - name: ✅  Health check new URLs
        if: steps.botcheck.outputs.skip == 'false' && steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          if [ ! -f ".generated-slugs.json" ]; then exit 0; fi
          SLUGS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.generated-slugs.json','utf8')).join(' '))")
          for SLUG in $SLUGS; do
            URL="https://www.indevastudio.com/insights/${SLUG}/"
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$URL")
            [ "$STATUS" = "200" ] \
              && echo "  ✅  $URL  →  HTTP 200" \
              || echo "  ⚠️   $URL  →  HTTP $STATUS (still propagating)"
          done

      - name: ℹ️  Nothing to generate
        if: steps.botcheck.outputs.skip == 'false' && steps.diff.outputs.changed == 'false'
        run: echo "✅ All blog posts are up to date."

      - name: ⏭️  Skipped (bot commit)
        if: steps.botcheck.outputs.skip == 'true'
        run: echo "⏭️ Bot commit detected — workflow skipped."

      - name: 📊  Summary
        if: always()
        run: |
          echo "## 🤖 Auto Blog Report" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment** | Vercel Deploy Hook ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(find insights -name "index.html" 2>/dev/null | grep -v "^insights/index.html$" | wc -l | tr -d ' ')
          echo "| **Total blog posts** | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Insights](https://www.indevastudio.com/insights/)" >> $GITHUB_STEP_SUMMARY
