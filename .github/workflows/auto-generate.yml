name: 🤖 Auto-Generate & Deploy Missing Blog Posts

on:
  schedule:
    - cron: '0 * * * *'    # every hour on the hour
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — detect only, do not generate'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  auto-generate:
    name: Detect → Generate → Commit → Deploy → Index → Notify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────
      - name: ⬇️  Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node setup ─────────────────────────────────────────────
      - name: ⚙️  Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Generate missing blog posts ────────────────────────────
      #   Internally also calls IndexNow + sends email notification
      - name: 🤖  Detect & generate missing blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INDEXNOW_KEY:      ${{ secrets.INDEXNOW_KEY }}
          NOTIFY_TO:         ${{ secrets.NOTIFY_TO }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/auto-generate.js --dry-run
          else
            node scripts/auto-generate.js
          fi

      # ── 4. Detect new files ───────────────────────────────────────
      - name: 🔎  Check for new files
        id: diff
        run: |
          git diff --quiet HEAD insights/ \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      # ── 5. Commit & push → triggers Vercel auto-deploy ───────────
      - name: 💾  Commit generated files → Vercel deploys
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "indeva-bot[auto]"
          git config user.email "indeva-bot@users.noreply.github.com"
          git add insights/*.html
          COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
          SLUGS=$(git diff --staged --name-only | sed 's|insights/||;s|\.html||' | tr '\n' ', ' | sed 's/,$//')
          git commit -m "🤖 auto: generate ${COUNT} blog post(s) [skip ci]

          Slugs: ${SLUGS}
          Time:  $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
          echo "✅ Pushed ${COUNT} blog file(s). Vercel is now deploying."

      # ── 6. Wait for Vercel CDN ────────────────────────────────────
      - name: ⏳  Wait for Vercel to deploy (90s)
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: sleep 90

      # ── 7. Health check — confirm 200 on every new URL ───────────
      - name: ✅  Health check new URLs
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          if [ ! -f ".generated-slugs.json" ]; then exit 0; fi
          SLUGS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.generated-slugs.json','utf8')).join(' '))")
          ALL_OK=true
          for SLUG in $SLUGS; do
            URL="https://www.indevastudio.com/insights/${SLUG}"
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "  ✅  ${URL}  →  HTTP 200"
            else
              echo "  ⚠️   ${URL}  →  HTTP ${STATUS} (CDN still propagating — will be live in 1-2 min)"
              ALL_OK=false
            fi
          done
          [ "$ALL_OK" = "false" ] && echo "Note: URLs will finish propagating shortly." || echo "All URLs confirmed live."

      # ── 8. Nothing to do ──────────────────────────────────────────
      - name: ℹ️  No missing posts found
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ All blog posts already have HTML files. Nothing generated."

      # ── 9. Job summary ────────────────────────────────────────────
      - name: 📊  Summary
        if: always()
        run: |
          echo "## 🤖 Auto Blog Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(ls insights/*.html 2>/dev/null | grep -v index.html | wc -l | tr -d ' ')
          echo "| **Total blog files** | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
          echo "| **IndexNow** | Pinged ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Email** | Sent to NOTIFY_TO ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Insights Page](https://www.indevastudio.com/insights/)" >> $GITHUB_STEP_SUMMARY
